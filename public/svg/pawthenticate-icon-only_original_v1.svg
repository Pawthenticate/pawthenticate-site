<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm, pet-friendly colors -->
    <linearGradient id="warmPaw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB347;stop-opacity:1" />
    </linearGradient>
    
    <!-- Soft brown for accents -->
    <linearGradient id="brownPaw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6345;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0826D;stop-opacity:1" />
    </linearGradient>
    
    <!-- Soft shadow -->
    <filter id="cuteShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feFlood flood-color="#FFB347" flood-opacity="0.2"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle for app icon -->
  <circle cx="100" cy="100" r="95" fill="#FFF5E6"/>
  
  <!-- Playful background circle -->
  <ellipse cx="100" cy="100" rx="80" ry="77" fill="#FFF5E6" opacity="0.5" transform="rotate(-15 100 100)"/>
  
  <!-- Main Paw Print centered and sized for icon -->
  <g transform="translate(100, 105)">
    <!-- Big main pad - wonky heart shape for cuteness -->
    <path d="M 0,8 
             C -20,8 -25,-5 -25,-12
             C -25,-18 -22,-22 -18,-22
             C -14,-22 -10,-20 0,-10
             C 10,-20 14,-22 18,-22
             C 22,-22 25,-18 25,-12
             C 25,-5 20,8 0,8 Z"
          fill="#FF6B6B" stroke="#8B6345" stroke-width="2.5" stroke-linecap="round" 
          transform="scale(1.8) rotate(180)" filter="url(#cuteShadow)"/>
    
    <!-- Toe beans - deliberately asymmetric for hand-drawn feel -->
    <ellipse cx="-25" cy="-38" rx="16" ry="20" fill="#FFB347" stroke="#8B6345" stroke-width="2.5" 
             transform="rotate(-20 -25 -38)"/>
    <ellipse cx="3" cy="-50" rx="18" ry="22" fill="#FF6B6B" stroke="#8B6345" stroke-width="2.5" 
             transform="rotate(5 3 -50)"/>
    <ellipse cx="28" cy="-36" rx="15" ry="20" fill="#FFB347" stroke="#8B6345" stroke-width="2.5" 
             transform="rotate(25 28 -36)"/>
    
    <!-- Little claw marks for extra pet detail -->
    <path d="M -25,-58 L -25,-65 M 3,-70 L 3,-77 M 28,-56 L 28,-63" 
          stroke="#8B6345" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Small floating hearts for charm -->
    <g opacity="0.7">
      <path d="M -50,-10 C -50,-13 -52,-15 -55,-15 C -58,-15 -60,-13 -60,-10 C -60,-13 -62,-15 -65,-15 C -68,-15 -70,-13 -70,-10 Q -60,0 -60,0 Q -50,-10 -50,-10 Z" 
            fill="#FF9999" transform="scale(0.7)">
        <animateTransform attributeName="transform" type="translate" 
                          values="0,0; 0,-3; 0,0" dur="2s" repeatCount="indefinite"/>
      </path>
      
      <path d="M 50,10 C 50,7 48,5 45,5 C 42,5 40,7 40,10 C 40,7 38,5 35,5 C 32,5 30,7 30,10 Q 40,20 40,20 Q 50,10 50,10 Z" 
            fill="#FFB347" transform="scale(0.6)">
        <animateTransform attributeName="transform" type="translate" 
                          values="0,0; 0,-2; 0,0" dur="2.5s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>