<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm gradient background -->
    <radialGradient id="bgGradient">
      <stop offset="0%" style="stop-color:#FFF8F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE8D6;stop-opacity:1" />
    </radialGradient>
    
    <!-- Main paw colors -->
    <linearGradient id="pawMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB347;stop-opacity:1" />
    </linearGradient>
    
    <!-- Toe bean pink -->
    <radialGradient id="toeBean">
      <stop offset="0%" style="stop-color:#FFB347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9A76;stop-opacity:1" />
    </radialGradient>
    
    <!-- App icon shadow -->
    <filter id="iconShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feFlood flood-color="#D2691E" flood-opacity="0.2"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Inner glow for depth -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feComposite in="coloredBlur" in2="SourceAlpha" operator="in" result="innerGlow"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="innerGlow"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with subtle gradient -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>
  
  <!-- Subtle background circle -->
  <circle cx="512" cy="512" r="460" fill="#FFF5E6" opacity="0.6"/>
  
  <!-- Main Paw Group - Centered and Scaled for Icon -->
  <g transform="translate(512, 540)">
    <!-- Shadow base -->
    <ellipse cx="0" cy="40" rx="200" ry="160" fill="#D2691E" opacity="0.1" filter="url(#iconShadow)"/>
    
    <!-- Main pad - heart shaped -->
    <path d="M 0,50 
             C -120,50 -150,-30 -150,-72
             C -150,-108 -132,-132 -108,-132
             C -84,-132 -60,-120 0,-60
             C 60,-120 84,-132 108,-132
             C 132,-132 150,-108 150,-72
             C 150,-30 120,50 0,50 Z"
          fill="#FF6B6B" stroke="#8B6345" stroke-width="12" stroke-linecap="round" 
          transform="rotate(180)" filter="url(#iconShadow)"/>
    
    <!-- Inner detail on main pad -->
    <path d="M 0,30 
             C -80,30 -100,-20 -100,-48
             C -100,-72 -88,-88 -72,-88
             C -56,-88 -40,-80 0,-40
             C 40,-80 56,-88 72,-88
             C 88,-88 100,-72 100,-48
             C 100,-20 80,30 0,30 Z"
          fill="#FF8A65" opacity="0.4" transform="rotate(180)"/>
    
    <!-- Left toe bean -->
    <ellipse cx="-140" cy="-220" rx="72" ry="88" fill="url(#toeBean)" stroke="#8B6345" stroke-width="10" 
             transform="rotate(-20 -140 -220)" filter="url(#iconShadow)"/>
    <ellipse cx="-140" cy="-220" rx="50" ry="60" fill="#FFCCBC" opacity="0.5" 
             transform="rotate(-20 -140 -220)"/>
    
    <!-- Center toe bean (largest) -->
    <ellipse cx="0" cy="-280" rx="84" ry="96" fill="#FF6B6B" stroke="#8B6345" stroke-width="10" 
             filter="url(#iconShadow)"/>
    <ellipse cx="0" cy="-280" rx="56" ry="64" fill="#FFAB91" opacity="0.5"/>
    
    <!-- Right toe bean -->
    <ellipse cx="140" cy="-220" rx="72" ry="88" fill="url(#toeBean)" stroke="#8B6345" stroke-width="10" 
             transform="rotate(20 140 -220)" filter="url(#iconShadow)"/>
    <ellipse cx="140" cy="-220" rx="50" ry="60" fill="#FFCCBC" opacity="0.5" 
             transform="rotate(20 140 -220)"/>
    
    <!-- Claw marks -->
    <g stroke="#8B6345" stroke-width="8" stroke-linecap="round" opacity="0.7">
      <path d="M -140,-300 L -140,-340"/>
      <path d="M 0,-370 L 0,-410"/>
      <path d="M 140,-300 L 140,-340"/>
    </g>
    
    <!-- Decorative hearts -->
    <g opacity="0.8">
      <!-- Left heart -->
      <path d="M -280,0 C -280,-20 -300,-40 -320,-40 C -340,-40 -360,-20 -360,0 C -360,-20 -380,-40 -400,-40 C -420,-40 -440,-20 -440,0 Q -360,80 -360,80 Q -280,0 -280,0 Z" 
            fill="#FF9999" transform="scale(0.8)">
        <animateTransform attributeName="transform" type="translate" 
                          values="0,0; 0,-20; 0,0" dur="3s" repeatCount="indefinite"/>
      </path>
      
      <!-- Right heart -->
      <path d="M 280,40 C 280,20 260,0 240,0 C 220,0 200,20 200,40 C 200,20 180,0 160,0 C 140,0 120,20 120,40 Q 200,120 200,120 Q 280,40 280,40 Z" 
            fill="#FFB347" transform="scale(0.7)">
        <animateTransform attributeName="transform" type="translate" 
                          values="0,0; 0,-15; 0,0" dur="3.5s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <!-- Corner accent - tiny paw print -->
  <g transform="translate(850, 850) scale(0.5)" opacity="0.3">
    <ellipse cx="0" cy="0" rx="40" ry="32" fill="#FFB347"/>
    <circle cx="-20" cy="-40" r="15" fill="#FFB347"/>
    <circle cx="20" cy="-40" r="15" fill="#FFB347"/>
    <circle cx="0" cy="-50" r="18" fill="#FFB347"/>
  </g>
</svg>