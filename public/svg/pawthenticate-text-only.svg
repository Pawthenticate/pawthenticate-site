<svg viewBox="0 0 350 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm colors for text -->
    <linearGradient id="warmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB347;stop-opacity:1" />
    </linearGradient>
    
    <!-- Brown gradient -->
    <linearGradient id="brownGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6345;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0826D;stop-opacity:1" />
    </linearGradient>
    
    <!-- Grass green for accent -->
    <linearGradient id="grassGreen">
      <stop offset="0%" style="stop-color:#7CB342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9CCC65;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Typography -->
  <g>
    <!-- Main text with playful font -->
    <text x="10" y="40" font-family="Comic Sans MS, Chalkboard SE, sans-serif" 
          font-size="38" font-weight="bold" fill="#8B6345">
      Paw<tspan fill="#FF6B6B">thenticate</tspan>
    </text>
    
    <!-- Tagline with casual style -->
    <text x="10" y="65" font-family="Comic Sans MS, Chalkboard SE, sans-serif" 
          font-size="14" fill="#A0826D" style="font-style: italic;">
      Where your pet's story lives
    </text>
    
    <!-- Playful squiggle underline -->
    <path d="M 10,70 Q 20,68 30,70 T 50,70 T 70,70 T 90,70 T 110,70 T 130,70" 
          stroke="#FFB347" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>
</svg>